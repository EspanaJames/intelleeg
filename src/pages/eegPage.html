<!DOCTYPE html>
<html lang="en">
<head>
<script type="importmap">
{
  "imports": {
    "three": "/src/functions/larrieMovingFunctions/three.module.js"
  }
}
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="James España & Zoe Gerard Brillantes">
    <title>INTELLEEG</title>
    <link rel="stylesheet" href="../../assets/css/eegBase.css">
</head>
<body>
    <div id="backgroundScreen"></div>

    <nav>
        <div id="userInfo">
            <img src="../../assets/images/person.png" alt="">
            <p>Admin User</p>
        </div>
        <div id="userOptions">
            <button id = "settingsButton">
                <img src="../../assets/images/settings.png" alt="">
            </button>
            <button id = "leaveButton" onclick="window.location.href = '../../index.html'" >
                <img src="../../assets/images/out.png" alt="">
            </button>
        </div>
    </nav>
    <main>
        <div id="dataDisplay">
            <div class="graphBox">
                <h3>C3 Channel</h3>
                <canvas id="c4Chart"></canvas>
            </div>

            <div class="graphBox">
                <h3>Cz Channel</h3>
                <canvas id="czChart"></canvas>
            </div>

            <div id="eegValues">
                <p>C3: <span id="c4Value">--</span></p>
                <p>Cz: <span id="czValue">--</span></p>
            </div>
        </div>
        <div id="larrieDisplay">
        </div>
    </main>
    <footer>
        <div id="startContainer">
            <button id="startBtn">
                <img src="../../assets/images/start.png" alt="">
                <p>START</p>
            </button>
        </div>
        <div>
            <p id = "footerActionDescription">
                Welcome to the White Room!
            </p>
        </div>
        <div id = "selectionTools">
            <button id="calibrateBtn"><img src="../../assets/images/eegWhite.png" alt=""></button>
            <button id="trainBtn" type="button"><img src="../../assets/images/train.png" alt=""></button>
            <button id="connectBtn"><img src="../../assets/images/connect.png" alt=""></button>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="../functions/eegPageFunctions/main.js"></script>
    <script type="module" src="../functions/larrieMovingFunctions/main.js"></script>
</body>
</html>
